# ============================================================
# LLM & Agent Configuration
# Tất cả config liên quan đến LLM, embedding, prompts, RAG
# ============================================================

llm:
  model: "gemini-2.5-flash"
  temperature: 0.7
  top_p: 0.95
  top_k: 40
  max_output_tokens: 8192

embedding:
  model: "gemini-embedding-001"
  # output_dimensionality được truyền thẳng vào Gemini API.
  # gemini-embedding-001 hỗ trợ: 768 | 1536 | 3072 (mặc định API trả về 3072)
  # ⚠️ Đổi giá trị này → phải reset Qdrant collections (mất toàn bộ data):
  #    docker compose down -v && docker compose up -d
  dimension: 768
  batch_size: 20

prompts:
  system_instruction: |
    ## VAI TRÒ
    Bạn là **MemRAG** — trợ lý AI thông minh với khả năng truy xuất tài liệu và ghi nhớ hội thoại. Bạn trả lời mọi câu hỏi: từ chat thông thường, giải thích, lập trình, sáng tạo, đến phân tích chuyên sâu — không giới hạn lĩnh vực.

    ## NỔI BẬT
    - **Knowledge Base (Wiki):** Tự động tổng hợp từ papers/tài liệu bạn upload. Gọi `read_wiki_index` để xem toàn bộ; `read_wiki_page` để đọc trang cụ thể. Wiki là nguồn tổng hợp đáng tin cậy nhất.
    - **Tài liệu & Transcript:** Tìm bằng `search_documents`, `search_meeting_transcripts`. Xem danh sách bằng `list_user_documents`, `list_meetings`.
    - **Memory:** Gọi `retrieve_memories` song song để nhớ context cá nhân. `store_memory` để ghi nhớ thông tin quan trọng.

    ## CHIẾN LƯỢC GỌI TOOL

    ### Quy trình cho câu hỏi về nội dung tài liệu

    **Bước 1 — Wiki trước**
    Gọi `read_wiki_index` → đọc các trang liên quan bằng `read_wiki_page`.
    - Gặp `[[pages/.../*.md]]` → đọc thêm nếu liên quan.
    - `is_stub: true` → bỏ qua.
    - `backlinks` → đọc thêm nếu cần context.

    **Bước 2 — Wiki không đủ → RAG**
    Khi thiếu số liệu cụ thể, chi tiết thuật toán, trích dẫn nguyên văn, hoặc topic không có trong wiki:
    → Gọi `search_documents` / `search_meeting_transcripts`. Câu hỏi cross-source: gọi song song.

    ### Câu hỏi chung (không liên quan tài liệu)
    KHÔNG gọi tool. Trả lời trực tiếp bằng kiến thức của bạn.

    ### Câu hỏi về danh sách
    "Tài liệu nào?", "Những buổi họp nào?" → `list_user_documents` / `list_meetings` trước.

    ### Memory
    Gọi `retrieve_memories` song song với Bước 1 khi trả lời câu hỏi cá nhân hóa.

    ## QUY TẮC TRẢ LỜI
    - Trả lời tự nhiên như một trợ lý thông minh — rõ ràng, hữu ích, đúng trọng tâm.
    - Có nguồn từ tài liệu: ghi rõ **[tên paper/tài liệu]** hoặc **[tên cuộc họp]**. Từ Wiki: "(Wiki — tổng hợp từ [sources])".
    - Khi so sánh ≥ 3 items: dùng bảng Markdown.
    - Không có trong tool: nói rõ, rồi dùng kiến thức của bạn nếu phù hợp — ghi "(kiến thức chung)".
    - Ngôn ngữ trùng người dùng; thuật ngữ kỹ thuật giữ nguyên gốc.
    - Lập trình: giải thích ngắn gọn, đưa code đúng ngôn ngữ, comment khi cần.
    - Khi trả lời dài: dùng headings, bullet points, tables cho dễ đọc.

  wiki_topic_extract_prompt: |
    Phân tích nội dung dưới đây và trích xuất thông tin để xây dựng Knowledge Base Wiki.
    Nguồn: "{source_name}"

    Trả về JSON object (chỉ JSON thuần, không có text khác) theo đúng format:
    {{
      "entities": [
        {{"slug": "kebab-case", "title": "Tên đầy đủ", "type": "model|framework|dataset|benchmark|researcher|lab|tool|method|concept"}}
      ],
      "topics": [
        {{"slug": "kebab-case", "title": "Tên đầy đủ"}}
      ],
      "summary": {{"slug": "kebab-case", "title": "Tóm tắt: Tên nguồn"}}
    }}

    ## Quy tắc trích xuất

    ⚠️ BẮT BUỘC: `entities` phải có ÍT NHẤT 1 phần tử, `topics` phải có ÍT NHẤT 1 phần tử, `summary` phải có đúng 1 phần tử. Không được để mảng rỗng [].

    ### entities (ÍT NHẤT 1, tối đa {max_entities}):
    Liệt kê mọi thực thể CÓ THỂ ĐỊNH DANH RÕ RÀNG — phủ rộng mọi lĩnh vực, không giới hạn AI/ML:
    - **model**: AI model, ML model, statistical model, mathematical model (GPT-4o, Claude, LLaMA, BERT, ResNet, ARIMA, GARCH...)
    - **framework**: thư viện, platform, standard (PyTorch, TensorFlow, React, Django, Kubernetes, ISO 9001, REST, GraphQL...)
    - **dataset**: tập dữ liệu, corpus (ImageNet, MMLU, World Bank, Kaggle datasets, custom enterprise datasets...)
    - **benchmark**: bộ đánh giá, metric system (HELM, SWE-bench, LeetCode, SPEC, TPC-C, LMBench...)
    - **researcher**: tác giả, nhà nghiên cứu, chuyên gia (Yann LeCun, Geoffrey Hinton, Andrew Ng, John Carmack...)
    - **lab**: tổ chức, công ty, institution (OpenAI, Google, Meta, MIT, Stanford, NASA, WHO...)
    - **tool**: công cụ, phần mềm, hạ tầng (Docker, K8s, Qdrant, PostgreSQL, Redis, Git, VS Code...)
    - **method**: phương pháp/algorithm CỤ THỂ có thể implement được — bất kỳ lĩnh vực nào:
      * Software: Agile, Scrum, CI/CD, TDD, Microservices, Event Sourcing, CQRS
      * AI/ML: ReAct, LoRA, RLHF, DPO, Chain-of-Thought, RAG
      * Data: ETL pipeline, MapReduce, Change Data Capture, OLAP cube
      * DevOps: Blue-Green Deployment, Canary Release, GitOps, Infrastructure as Code
      * Science: Monte Carlo method, Finite Element Analysis, CRISPR, PCR
      * Business: Lean Startup, OKR, A/B Testing, Growth Hacking
      **Phân biệt với concept**: method = quy trình/algorithm CỤ THỂ có thể implement; concept = ý tưởng/kiến trúc tổng quát.
    - **concept**: kiến trúc/paradigm/ý tưởng tổng quát:
      Transformer, Microservices, Serverless, Agile, DevOps, CI/CD, REST, ACID, CAP Theorem, Blockchain, Edge Computing, API Gateway, Event-Driven Architecture
    Không bỏ sót entity nào. Bắt buộc phải có ít nhất 1 entity.

    ### topics (ÍT NHẤT 1, tối đa {max_topics}, chọn quan trọng nhất):
    Các CHỦ ĐỀ cấp độ cao — vấn đề/hướng quan trọng đang được thảo luận:
    - Bất kỳ lĩnh vực: công nghệ, kinh doanh, khoa học, giáo dục, y tế, pháp lý, môi trường...
    - Ví dụ: "Cloud Migration Strategy", "Data Privacy Compliance", "Performance Optimization", "Cost Reduction", "User Experience Design", "System Reliability"
    KHÔNG trùng lặp với entities. Bắt buộc phải có ít nhất 1 topic.

    ### summary (luôn có đúng 1):
    Slug = slugify của source_name, title = "Tóm tắt: {source_name}"

    ## Quy tắc slug
    CHỈ dùng chữ thường a-z và số 0-9, KHÔNG dùng dấu gạch ngang hay ký tự đặc biệt, tối đa 60 ký tự.
    Ví dụ: "gpt4o", "kubernetes", "reactframework", "awss3", "pythonfastapi"
    ⚠️ "U-Net" → "unet", "GPT-4o" → "gpt4o", "LoRA" → "lora", "CI/CD" → "cicd"

    ## Nội dung cần phân tích:
    {text}
    {wiki_context}
  wiki_synthesis_prompt: |
    ## Quy tắc Wiki (wiki_schema.md — nguồn sự thật, ưu tiên hơn mọi hướng dẫn bên dưới nếu mâu thuẫn):
    {schema}

    ---

    Cập nhật trang Wiki về "{topic_title}" (type: **{topic_type}**) với thông tin mới từ nguồn "{source_name}" (ID: {source_id}).

    ⚠️ Dùng template phù hợp với type **"{topic_type}"** ở phía dưới. Nếu type là "auto", suy luận từ tên entity.

    ## Nội dung Wiki hiện tại (trống nếu trang mới):
    {existing_content}

    ## Nội dung mới cần tích hợp:
    {new_text}

    Yêu cầu output (chỉ Markdown thuần, KHÔNG bọc trong code fence ```, không có text giải thích ngoài):

    ⚠️ QUY TẮC CHÍNH XÁC (bắt buộc — ưu tiên hơn mọi quy tắc khác):
    1. KHÔNG bịa số liệu: Mọi con số, metric, stat PHẢI có trong `new_text` hoặc `existing_content`. Không được tự suy ra.
    2. Giữ nguyên số liệu: KHÔNG làm tròn, KHÔNG đổi đơn vị. "93.7%" → giữ nguyên "93.7%".
    3. Công thức/code: Copy chính xác từ nguồn.
    4. Nếu không chắc: Thà bỏ trống hoặc ghi "(số liệu không có trong nguồn)" còn hơn bịa.
    5. Đối chiếu trước khi viết: Mỗi claim có số liệu → kiểm tra lại trong nguồn.
    6. **MERGE, KHÔNG REPLACE**: Giữ TOÀN BỘ nội dung hiện tại. `new_text` chứa toàn bộ đoạn văn liên quan — tổng hợp đầy đủ, không bỏ sót section nào.
    7. **One-pass synthesis**: Viết đầy đủ, chi tiết ngay từ đầu — đừng viết tóm tắt hay placeholder.
    8. **Bảng Markdown đúng chuẩn GFM**: BẮT BUỘC có dòng separator sau header row:
       ```
       | Header 1 | Header 2 |
       |----------|----------|
       | Cell 1   | Cell 2   |
       ```

    Bắt đầu bằng YAML frontmatter:
    ---
    title: (tên entity/topic)
    tags: [tag1, tag2]
    type: {topic_type}
    sources: [{source_id}]
    last_updated: (ngày hôm nay ISO 8601)
    version: (tăng 1 so với version cũ, hoặc 1 nếu trang mới)
    ---

    ⚠️ QUAN TRỌNG về trường `sources`:
    - Dùng source ID (ví dụ: "{source_id}"), KHÔNG dùng tên file
    - Nếu trang đã có sources từ trước, GIỮ NGUYÊN và THÊM "{source_id}"
    - Ví dụ đúng: sources: [doc-abc123, doc-xyz789]

    **Cho entity loại model (AI/ML model, statistical model...):**
    ## Tổng quan
    Là gì, do ai/org nào phát triển, thuộc lĩnh vực nào.
    ## Kiến trúc & Thông số
    Architecture, parameter count, training approach, key specs.
    ## Kết quả & Đánh giá
    Số liệu cụ thể từ nguồn — benchmark, metric, so sánh.
    ## Điểm mạnh & Hạn chế
    Dựa trên bằng chứng từ nguồn.
    ## Entities liên quan
    [[pages/entities/slug.md]] — quan hệ.
    ## Tiến triển & Phiên bản
    Tracking thay đổi qua các phiên bản / nguồn.

    ---

    **Cho entity loại method (bất kỳ phương pháp/algorithm cụ thể):**
    ## Vấn đề giải quyết
    Method này ra đời để giải quyết vấn đề gì.
    ## Cách hoạt động
    Mô tả step-by-step hoặc pseudocode nếu nguồn có. Giữ nguyên notation.
    ## Điều kiện áp dụng
    Khi nào nên dùng, prerequisite, constraint.
    ## Kết quả thực nghiệm
    Task/dataset, improvement so với baseline (kèm số liệu).
    ## Variants & Extensions
    Các biến thể cải tiến.
    ## Entities liên quan
    [[pages/entities/slug.md]] — mô tả quan hệ.

    ---

    **Cho entity loại concept (kiến trúc/paradigm tổng quát):**
    ## Định nghĩa
    Là gì, thuộc lĩnh vực nào, giải quyết vấn đề gì.
    ## Nguyên lý cốt lõi
    Key ideas, mathematical/intuitive foundation.
    ### Công thức (nếu có)
    $$ ... LaTeX formula ... $$
    **Giải thích biến số:**
    - $\alpha$ = ...
    ## Ứng dụng chính
    Được dùng trong loại system/model nào.
    ## Methods cụ thể thuộc concept này
    [[pages/entities/method-slug.md]] — các method implement concept này.
    ## Entities liên quan
    [[pages/entities/slug.md]]

    ---

    **Cho entity loại dataset/benchmark:**
    ## Mô tả
    Mục đích, domain, scale.
    ## Cấu trúc & Format
    Split, annotation type, evaluation metric.
    ## Bảng so sánh kết quả
    | Model/System | Score | Year | Source |
    |--------------|-------|------|--------|
    Giữ nguyên kết quả cũ, thêm mới.
    ## Trend Analysis
    1-2 câu phân tích xu hướng.
    ## Được dùng để đánh giá
    ## Hạn chế & Bias đã biết

    ---

    **Cho entity loại framework/tool/platform:**
    ## Tổng quan
    Là gì, do ai phát triển, dùng để làm gì.
    ## Kiến trúc & Thành phần chính
    Core architecture, modules, components.
    ## Cài đặt & Cấu hình
    Requirements, setup steps, config key points.
    ## Use Cases & Ví dụ
    Các use case tiêu biểu, code mẫu nếu có.
    ## So sánh với alternatives
    So sánh nhanh với các framework/tool tương tự.
    ## Entities liên quan
    [[pages/entities/slug.md]]

    ---

    **Cho entity loại researcher/lab/org:**
    ## Tổng quan
    Ai/đâu, lĩnh vực chuyên môn, vị trí trong ngành.
    ## Đóng góp chính
    Papers, products, methods tiêu biểu.
    ## Triết lý / Hướng tiếp cận
    ## Entities liên quan
    [[pages/entities/slug.md]] — papers, methods, products.

    ---

    **Cho topic (chủ đề cấp cao):**
    ## Vấn đề & Động lực
    ## Các approach đang được thảo luận
    ## Kết quả nổi bật (kèm số liệu)
    ## Open challenges
    ## Key entities liên quan

    ---

    **Cho summary (tóm tắt nguồn đơn lẻ):**
    ## Thông tin nguồn
    - **Source ID**: {source_id}
    - **Tên nguồn**: {source_name}
    - **Tác giả**: (nếu có)
    - **Năm / Venue**: (nếu có)
    - **Lĩnh vực**: (tự động xác định)
    ## TL;DR (1-2 câu)
    ## Điểm chính (bullet points)
    ## Chi tiết
    ## Kết luận & Hạn chế
    ## Entities được đề cập
    Liệt kê đầy đủ với [[pages/entities/slug.md]] — vai trò.

    ⚠️ QUY TẮC TÍCH HỢP (bắt buộc):
    - Giữ nguyên thuật ngữ chuyên ngành bằng gốc.
    - Gắn nguồn sau mỗi claim: [tên nguồn].
    - Nếu thông tin mới MÂU THUẪN: KHÔNG xóa — dùng strikethrough:
      ~~Thông tin cũ [nguồn cũ]~~ → Thông tin mới [nguồn mới]
    - Thêm section "## Lịch sử / Tiến triển" khi có mâu thuẫn:
      | Thời điểm | Thay đổi | Nguồn |
      |-----------|----------|-------|
    - Tối đa 1000 words per page.
    - **BẮT BUỘC dùng `[[pages/category/slug.md]]` syntax** khi nhắc đến entity/topic:
      - Entity → `[[pages/entities/slug.md]]`
      - Topic → `[[pages/topics/slug.md]]`
      - Summary → `[[pages/summaries/slug.md]]`
      Slug chỉ gồm `[a-z0-9]`.
    - Section "Entities liên quan" PHẢI liệt kê đầy đủ.

  wiki_conversation_relevance_prompt: |
    Đánh giá xem conversation summary dưới đây có chứa thông tin đáng cập nhật vào Wiki không.

    ## Wiki hiện có:
    {wiki_context}

    ## Conversation Summary:
    {summary_text}

    ## Nhiệm vụ:
    1. Xác định summary có chứa thông tin mới (số liệu, kết luận, quyết định, phát hiện, kiến thức) liên quan đến entities/topics đã có trong Wiki không.
    2. Nếu có, liệt kê các slug (chỉ slug, không có category) của các trang cần update.
    3. Chitchat, câu hỏi chung, greeting → KHÔNG update.

    Trả về JSON object (chỉ JSON thuần, không có text khác):
    {{"should_update": true/false, "matched_slugs": ["slug1", "slug2"], "reason": "lý do ngắn gọn"}}

    Quy tắc:
    - `should_update=true` CHỈ KHI có ít nhất 1 matched_slug VÀ có thông tin thực sự mới
    - `matched_slugs` chỉ dùng các slug đã có trong danh sách Wiki hiện có
    - Tối đa 5 slugs

  wiki_conversation_synthesis_prompt: |
    Bổ sung thông tin mới từ conversation vào trang Wiki đã có.

    ## Trang Wiki hiện tại (KHÔNG thay đổi structure, KHÔNG xóa thông tin cũ):
    {existing_content}

    ## Thông tin mới từ conversation (chỉ lấy facts liên quan):
    {new_info}

    ## Quy tắc BẮT BUỘC:
    1. CHỈ thêm thông tin mới vào section phù hợp — KHÔNG thay đổi structure, KHÔNG xóa bất kỳ thông tin nào
    2. Nếu thông tin đã có → KHÔNG lặp lại, bỏ qua
    3. Giữ nguyên frontmatter (title, tags, sources, last_updated, version) — chỉ tăng version thêm 1
    4. Thêm `conversation:{source_id}` vào sources list nếu chưa có
    5. Nếu không có thông tin mới thực sự → trả về NGUYÊN XI trang Wiki hiện tại (không thay đổi gì)
    6. Giữ nguyên tất cả `[[pages/...]]` links
    7. KHÔNG bịa thêm thông tin không có trong conversation

    Trả về toàn bộ nội dung trang Markdown (bao gồm frontmatter).
    Source ID để thêm vào sources: {source_id}
    Tên trang: {topic_title}

rag:
  chunk_size: 1000
  chunk_overlap: 200
  top_k_results: 5
  max_doc_length: 8192
  max_query_length: 2048
