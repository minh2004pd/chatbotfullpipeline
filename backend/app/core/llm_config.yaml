# ============================================================
# LLM & Agent Configuration
# Tất cả config liên quan đến LLM, embedding, prompts, RAG
# ============================================================

llm:
  model: "gemini-2.5-flash"
  temperature: 0.7
  top_p: 0.95
  top_k: 40
  max_output_tokens: 8192

embedding:
  model: "gemini-embedding-001"
  # output_dimensionality được truyền thẳng vào Gemini API.
  # gemini-embedding-001 hỗ trợ: 768 | 1536 | 3072 (mặc định API trả về 3072)
  # ⚠️ Đổi giá trị này → phải reset Qdrant collections (mất toàn bộ data):
  #    docker compose down -v && docker compose up -d
  dimension: 768
  batch_size: 20

prompts:
  system_instruction: |
    ## VAI TRÒ
    Bạn là **MemRAG Research Assistant** — trợ lý nghiên cứu AI chuyên sâu. Bạn giúp người dùng tổng hợp, tra cứu, và phân tích papers, tài liệu kỹ thuật, ghi chú nghiên cứu, và transcript thảo luận. Ưu tiên dữ liệu trong hệ thống; không bịa chi tiết không có trong kết quả tool.

    **Chuyên môn:** LLMs · Agentic AI · NLP · Computer Vision · Reinforcement Learning · Generative AI (text/image/video/audio) · Multimodal · AI Safety & Alignment · Model Evaluation & Benchmarking · Efficient ML (LoRA, quantization, distillation) · AI Infrastructure & Serving · Prompt Engineering · RAG & Retrieval.

    ## NGUỒN DỮ LIỆU
    - **Tài liệu/Papers (PDF/file):** papers, báo cáo kỹ thuật, notes nghiên cứu. Tìm bằng `search_documents`; xem danh sách bằng `list_user_documents`.
    - **Cuộc họp / thảo luận (ghi âm):** transcript chỉ có trong RAG sau khi **dừng ghi**. Xem danh sách bằng `list_meetings`; tìm nội dung bằng `search_meeting_transcripts`. Trong lúc đang ghi live, đừng giả định đã có trong vector store.
    - **Wiki (knowledge base tổng hợp):** AI tự động tổng hợp Markdown pages từ nhiều papers/meetings về cùng model/technique/topic. Dùng `read_wiki_index` để xem toàn bộ knowledge base; `read_wiki_page` để đọc trang cụ thể. Wiki lưu lịch sử tiến triển của một technique/model qua nhiều nguồn.
    - **Memory:** `retrieve_memories` — research context, preferences cá nhân; dùng để cá nhân hóa câu trả lời.

    ## CHIẾN LƯỢC GỌI TOOL

    ### QUY TRÌNH cho mọi câu hỏi về nội dung

    **Bước 1 — Wiki (luôn làm trước)**
    Gọi `read_wiki_index` → với mỗi trang liên quan gọi `read_wiki_page`.
    - Gặp `[[pages/.../*.md]]` trong nội dung → đọc thêm trang đó nếu liên quan.
    - Trang có `backlinks` → đọc thêm 1-2 backlink nếu cần thêm context.
    - `is_stub: true` → bỏ qua.

    **Bước 2 — Nếu wiki không đủ → RAG ngay**
    Wiki không đủ khi: thiếu số liệu cụ thể, thiếu chi tiết algorithm/công thức, cần trích dẫn nguyên văn, hoặc topic không có trong wiki.
    → Gọi `search_documents` và/hoặc `search_meeting_transcripts` với keyword kỹ thuật (tên model/method/dataset). Thử lại tối đa 2 lần. Câu hỏi cross-source: gọi song song.
    Wiki đủ khi đã có nội dung rõ về tổng quan / định nghĩa / so sánh / lịch sử → trả lời ngay không cần RAG.

    ### Trường hợp đặc biệt

    **Câu hỏi về danh sách tài liệu:** "Tôi có những paper nào?", "danh sách tài liệu về X" →
    Gọi `list_user_documents` trước, rồi mới wiki/RAG nếu cần nội dung.

    **Câu hỏi về meetings:** "Tôi có những buổi thảo luận nào?", "meeting gần nhất" →
    Gọi `list_meetings` trước, rồi mới wiki/RAG nếu cần nội dung.

    **Memory:** Gọi `retrieve_memories` song song với Bước 1 để cá nhân hóa phong cách trả lời.

    ## QUY TẮC TRẢ LỜI
    - **Trả lời như một research peer** — technical, chính xác, không giải thích thừa khái niệm cơ bản trừ khi được hỏi.
    - Gắn nguồn sau mỗi claim: **[tên paper/tài liệu]** hoặc **[tên cuộc họp]**.
    - Từ Wiki: ghi rõ "(Wiki — tổng hợp từ [sources])"; trình bày wiki trước, RAG bổ sung sau.
    - Từ `list_user_documents` / `list_meetings`: trình bày dạng danh sách rõ ràng.
    - Khi so sánh models/techniques: dùng bảng Markdown nếu ≥ 3 điểm so sánh.
    - Không thấy trong tool: nói rõ thiếu ở nguồn nào, rồi mới dùng kiến thức nền nếu phù hợp — ghi rõ "(kiến thức nền, không từ tài liệu của bạn)".
    - Ngôn ngữ trùng với người dùng (Tiếng Việt hoặc Tiếng Anh); kỹ thuật thì giữ nguyên thuật ngữ gốc.

  wiki_topic_extract_prompt: |
    Phân tích nội dung AI/research sau và trích xuất thông tin để xây dựng Knowledge Base Wiki.
    Nguồn: "{source_name}"

    Trả về JSON object (chỉ JSON thuần, không có text khác) theo đúng format:
    {{
      "entities": [
        {{"slug": "kebab-case", "title": "Tên đầy đủ", "type": "model|framework|dataset|benchmark|researcher|lab|tool|method|concept"}}
      ],
      "topics": [
        {{"slug": "kebab-case", "title": "Tên đầy đủ"}}
      ],
      "summary": {{"slug": "kebab-case", "title": "Tóm tắt: Tên nguồn"}}
    }}

    ## Quy tắc trích xuất

    ⚠️ BẮT BUỘC: `entities` phải có ÍT NHẤT 1 phần tử, `topics` phải có ÍT NHẤT 1 phần tử, `summary` phải có đúng 1 phần tử. Không được để mảng rỗng [].

    ### entities (ÍT NHẤT 1, tối đa {max_entities}):
    Liệt kê mọi thực thể CÓ THỂ ĐỊNH DANH RÕ RÀNG — phủ rộng toàn bộ lĩnh vực AI/ML:
    - **model**: mọi AI/ML model (LLM: GPT-4o, Claude, Gemini, LLaMA; CV: ViT, DINO, SAM, DALL-E 3, Stable Diffusion, Sora; RL: AlphaGo, MuZero; Speech: Whisper, Soniox; Multimodal: Flamingo, LLaVA, CogVLM)
    - **framework**: thư viện, platform (PyTorch, JAX, TensorFlow, HuggingFace Transformers, Diffusers, LangChain, LlamaIndex, AutoGen, CrewAI, Google ADK, vLLM, TGI, Triton)
    - **dataset**: tập dữ liệu (NLP: GLUE, SQuAD, MMLU; CV: ImageNet, COCO, LAION; RL: Atari, MuJoCo; GenAI: LAION-5B, DCI; Multimodal: VQA, MSCOCO Captions)
    - **benchmark**: bộ đánh giá (HELM, BIG-Bench, LMSYS Arena, SWE-bench, HumanEval, GSM8K, MATH, AgentBench, EvalPlus, ImageNet-1k accuracy, FID, FID-30k, IS)
    - **researcher**: tác giả, nhà nghiên cứu (Yann LeCun, Geoffrey Hinton, Andrej Karpathy, Demis Hassabis, Ilya Sutskever, Pieter Abbeel, Jitendra Malik, Ian Goodfellow)
    - **lab**: tổ chức nghiên cứu, công ty AI (OpenAI, Anthropic, Google DeepMind, Meta AI, Mistral AI, Cohere, xAI, Stability AI, Midjourney, RunwayML, Berkeley AI Research)
    - **tool**: công cụ hạ tầng (Qdrant, Weaviate, FAISS, Ray, CUDA, TensorRT, W&B, MLflow, DVC)
    - **method**: phương pháp/algorithm CỤ THỂ được đề xuất hoặc mô tả chi tiết — thường là đóng góp cốt lõi của paper:
      * LLM/Agentic: ReAct, Self-RAG, Toolformer, Constitutional AI, Self-Consistency, Tree of Thoughts, Speculative Decoding, Chain-of-Thought Prompting, Least-to-Most Prompting
      * Training: RLHF, DPO, PPO fine-tuning, SFT, GRPO, Rejection Sampling, Direct Alignment
      * Efficient ML: LoRA, QLoRA, DoRA, Prefix Tuning, Adapter, Prompt Tuning, Quantization (GPTQ, AWQ, GGUF), Pruning, Knowledge Distillation
      * RAG: HyDE, Self-RAG, Adaptive RAG, GraphRAG, FLARE, Corrective RAG
      * CV: DETR, SAM (Segment Anything Method), DINOv2 self-supervised, Stable Diffusion pipeline, ControlNet conditioning
      * RL: PPO, SAC, TD3, MCTS, AlphaZero self-play, Offline RL (IQL, CQL), RLHF pipeline
      * Evaluation: LLM-as-Judge, MT-Bench evaluation, G-Eval, Chatbot Arena methodology
      **Phân biệt với concept**: method = quy trình/algorithm CỤ THỂ có thể implement được; concept = ý tưởng/kiến trúc tổng quát.
    - **concept**: kiến trúc/paradigm tổng quát, không phải một method cụ thể:
      Transformer architecture, Attention mechanism, Diffusion process, GAN training, Contrastive Learning paradigm, In-context Learning, Few-shot Learning, Zero-shot Learning, Transfer Learning, Multi-task Learning, Meta-learning, Mixture of Experts (MoE), Retrieval-Augmented Generation (concept), Agentic AI (paradigm)
    Không bỏ sót entity nào. Bắt buộc phải có ít nhất 1 entity.

    ### topics (ÍT NHẤT 1, tối đa {max_topics}, chọn quan trọng nhất):
    Các CHỦ ĐỀ NGHIÊN CỨU cấp độ cao — vấn đề/hướng nghiên cứu đang được giải quyết:
    - **LLM/Agentic**: "Long-context Reasoning", "Tool Use in LLMs", "Multi-agent Orchestration", "LLM Hallucination", "Alignment & Safety"
    - **NLP**: "Machine Translation Quality", "Information Extraction", "Semantic Parsing", "Question Answering"
    - **CV**: "Zero-shot Object Detection", "3D Scene Understanding", "Video Generation", "Image Segmentation at Scale"
    - **RL**: "Sample Efficiency in RL", "Offline RL", "Multi-agent RL", "RL for Robotics"
    - **GenAI**: "Text-to-Image Consistency", "Video Generation Coherence", "Controllable Generation", "Multimodal Generation"
    - **Efficient ML**: "Model Compression", "Inference Optimization", "Parameter-efficient Fine-tuning"
    - **Cross-domain**: "Foundation Models", "Transfer Learning", "Self-supervised Learning"
    KHÔNG trùng lặp với entities. Bắt buộc phải có ít nhất 1 topic.

    ### summary (luôn có đúng 1):
    Slug = slugify của source_name, title = "Tóm tắt: {source_name}"

    ## Quy tắc slug
    CHỈ dùng chữ thường a-z và số 0-9, KHÔNG dùng dấu gạch ngang hay ký tự đặc biệt, tối đa 60 ký tự.
    Ví dụ: "gpt4o", "chainofthought", "swebench", "googledeepmind", "agenticaiplanning"
    ⚠️ "u-net" → "unet", "anno-ddpm" → "annoddpm", "GPT-4o" → "gpt4o", "LoRA" → "lora"

    ## Nội dung cần phân tích:
    {text}

  wiki_synthesis_prompt: |
    ## Quy tắc Wiki (wiki_schema.md — nguồn sự thật, ưu tiên hơn mọi hướng dẫn bên dưới nếu mâu thuẫn):
    {schema}

    ---

    Cập nhật trang Wiki nghiên cứu về "{topic_title}" (type: **{topic_type}**) với thông tin mới từ nguồn "{source_name}" (ID: {source_id}).

    ⚠️ Dùng template phù hợp với type **"{topic_type}"** ở phía dưới. Nếu type là "auto", suy luận từ tên entity.

    ## Nội dung Wiki hiện tại (trống nếu trang mới):
    {existing_content}

    ## Nội dung mới cần tích hợp:
    {new_text}

    Yêu cầu output (chỉ Markdown thuần, KHÔNG bọc trong code fence ```, không có text giải thích ngoài):

    ⚠️ QUY TẮC CHÍNH XÁC (bắt buộc — ưu tiên hơn mọi quy tắc khác):
    1. KHÔNG bịa số liệu: Mọi con số (accuracy, F1, BLEU, params, FLOPs, latency...) PHẢI có trong `new_text` hoặc `existing_content`. Không được tự suy ra.
    2. Giữ nguyên số liệu: KHÔNG làm tròn, KHÔNG đổi đơn vị, KHÔNG sửa decimal places. "93.7%" → giữ nguyên "93.7%".
    3. Công thức: Copy chính xác từ nguồn. KHÔNG sửa ký hiệu, KHÔNG đổi notation.
    4. Nếu không chắc: Thà bỏ trống hoặc ghi "(số liệu không có trong nguồn)" còn hơn bịa.
    5. Đối chiếu trước khi viết: Mỗi claim có số liệu → kiểm tra lại trong nguồn có đúng không.
    6. **MERGE, KHÔNG REPLACE**: Giữ TOÀN BỘ nội dung hiện tại trong wiki. `new_text` chứa TẤT CẢ đoạn văn từ paper có đề cập đến topic này — viết thành trang tổng hợp đầy đủ, không bỏ sót section nào. KHÔNG xóa, KHÔNG viết lại sections đã có nếu không có mâu thuẫn trực tiếp.
    7. **One-pass synthesis**: Trang này chỉ được synthesize 1 lần duy nhất với toàn bộ nội dung liên quan. Viết đầy đủ, chi tiết ngay từ đầu — đừng viết tóm tắt hay placeholder.
    8. **Bảng Markdown đúng chuẩn GFM**: KHI DÙNG BẢNG, BẮT BUỘC phải có dòng separator sau header row:
       ```
       | Header 1 | Header 2 | Header 3 |
       |----------|----------|----------|
       | Cell 1   | Cell 2   | Cell 3   |
       ```
       KHÔNG BAO GIỜ viết bảng thiếu dòng separator (dòng có `|---|---|`). Không có separator row thì bảng sẽ không hiển thị được.

    Bắt đầu bằng YAML frontmatter:
    ---
    title: (tên entity/topic)
    tags: [tag1, tag2]
    type: {topic_type}
    sources: [{source_id}]
    last_updated: (ngày hôm nay ISO 8601)
    version: (tăng 1 so với version cũ, hoặc 1 nếu trang mới)
    ---

    ⚠️ QUAN TRỌNG về trường `sources`:
    - Dùng source ID (ví dụ: "{source_id}"), KHÔNG dùng tên file (ví dụ: "paper.pdf")
    - Nếu trang đã có sources từ trước, GIỮ NGUYÊN các source ID cũ và THÊM "{source_id}" vào list
    - Ví dụ đúng: sources: [doc-abc123, doc-xyz789]
    - Ví dụ sai: sources: [paper.pdf, meeting-q1.txt]

    **Cho entity loại model (LLM/CV/RL/GenAI model):**
    ## Tổng quan
    Là gì, do ai/lab nào phát triển, thuộc lĩnh vực nào (NLP/CV/RL/Multimodal/GenAI).
    ## Kiến trúc & Thông số kỹ thuật
    Architecture (Transformer, Diffusion, GAN, CNN...), parameter count, context length, training data, training approach.
    ## Kết quả & Benchmarks
    Số liệu cụ thể từ nguồn — benchmark name, score, so sánh baseline.
    ## Điểm mạnh & Hạn chế
    Dựa trên bằng chứng từ nguồn, không suy đoán.
    ## Entities liên quan
    [[pages/entities/slug.md]] — quan hệ (trained on / built on / compared against / successor of...).
    ## Tiến triển & Phiên bản
    Tracking thay đổi qua các phiên bản / nguồn.

    ---

    **Cho entity loại method (ReAct, LoRA, Self-RAG, DPO, HyDE, ControlNet...):**
    ## Vấn đề giải quyết
    Method này ra đời để giải quyết vấn đề gì, trong bối cảnh nào.
    ## Cách hoạt động (Algorithm)
    Mô tả step-by-step hoặc pseudocode nếu nguồn có. Giữ nguyên notation/formula.
    ## Điều kiện áp dụng
    Khi nào nên dùng, prerequisite, constraint (e.g., LoRA cần model có linear layers, HyDE cần LLM).
    ## Kết quả thực nghiệm
    Task/dataset đã được test, improvement so với baseline (kèm số liệu).
    ## Variants & Extensions
    Các biến thể cải tiến (LoRA → QLoRA, DoRA, AdaLoRA; CoT → Self-Consistency, ToT...).
    ## Entities liên quan
    [[pages/entities/slug.md]] — models áp dụng, frameworks implement, papers đề xuất.

    ---

    **Cho entity loại concept (Transformer, Diffusion process, Agentic AI paradigm...):**
    ## Định nghĩa
    Là gì, thuộc lĩnh vực nào (NLP/CV/RL/GenAI), giải quyết vấn đề gì ở mức paradigm.
    ## Nguyên lý cốt lõi
    Key ideas, mathematical intuition (không cần implement-level detail).
    ## Ứng dụng chính
    Được dùng trong loại model/system nào.
    ## Methods cụ thể thuộc concept này
    [[pages/entities/method-slug.md]] — các method cụ thể implement concept này.
    ## Entities liên quan
    [[pages/entities/slug.md]] — models, frameworks, papers tiêu biểu.

    ---

    **Cho entity loại dataset/benchmark:**
    ## Mô tả
    Mục đích, domain, scale (số samples/classes/tokens).
    ## Cấu trúc & Format
    Split (train/val/test), annotation type, evaluation metric.
    ## Bảng so sánh kết quả
    Dùng Markdown table để tổng hợp kết quả từ nhiều sources:
    | Model | Score | Year | Source |
    |-------|-------|------|--------|
    Thêm các kết quả mới vào bảng, GIỮ NGUYÊN kết quả cũ từ các sources trước.
    Mỗi row ghi rõ source paper trong cột Source (ví dụ: "paper-vit.pdf").
    ## Trend Analysis
    1-2 câu phân tích xu hướng dựa trên bảng kết quả (ví dụ: "Từ 2024, các mô hình bắt đầu chuyển sang kiến trúc X, cải thiện Y% trên benchmark này").
    ## Được dùng để đánh giá
    Tasks, models đã được benchmark trên đây.
    ## Hạn chế & Bias đã biết

    ---

    **Cho entity loại concept (khi có công thức toán học):**
    ## Định nghĩa
    Là gì, thuộc lĩnh vực nào (NLP/CV/RL/GenAI), giải quyết vấn đề gì ở mức paradigm.
    ## Nguyên lý cốt lõi
    Key ideas, mathematical intuition (không cần implement-level detail).
    ### Công thức
    $$
    ... LaTeX formula ...
    $$
    **Giải thích biến số:**
    - $\alpha$ = learning rate
    - $d$ = model dimension
    - ... (giải thích từng biến trong công thức)
    ## Ứng dụng chính
    Được dùng trong loại model/system nào.
    ## Methods cụ thể thuộc concept này
    [[pages/entities/method-slug.md]] — các method cụ thể implement concept này.
    ## Entities liên quan
    [[pages/entities/slug.md]] — models, frameworks, papers tiêu biểu.

    ---

    **Cho topic (research direction/open problem):**
    ## Vấn đề & Động lực
    ## Các approach đang được nghiên cứu
    ## Kết quả SOTA hiện tại (kèm số liệu)
    ## Open challenges
    ## Key papers & Entities liên quan

    ---

    **Cho summary (tóm tắt paper/nguồn đơn lẻ):**
    ## Thông tin nguồn
    - **Source ID**: {source_id}
    - **Tên nguồn**: {source_name}
    - **Tác giả**: (trích từ nội dung nếu có, để trống nếu không rõ)
    - **Năm / Venue**: (năm công bố và venue/conference nếu có, ví dụ: 2023, NeurIPS)
    - **Lĩnh vực**: (NLP / CV / RL / GenAI / Multimodal / Efficient ML / ...)
    ## TL;DR (1-2 câu)
    ## Đóng góp chính (bullet points)
    ## Phương pháp
    ## Kết quả chính (kèm số liệu benchmark nếu có)
    ## Hạn chế & Future work
    ## Entities được đề cập trong nguồn
    Liệt kê đầy đủ với [[pages/entities/slug.md]] — vai trò trong nguồn này.

    ⚠️ QUY TẮC TÍCH HỢP (bắt buộc):
    - Giữ nguyên thuật ngữ kỹ thuật bằng tiếng Anh (đừng dịch "attention mechanism", "fine-tuning"...).
    - Gắn nguồn sau mỗi claim: [tên nguồn].
    - Nếu thông tin mới MÂU THUẪN với thông tin cũ: KHÔNG xóa — dùng strikethrough:
      ~~Thông tin cũ [nguồn cũ]~~ → Thông tin mới [nguồn mới]
    - Thêm section "## Lịch sử / Tiến triển" khi có mâu thuẫn hoặc nhiều phiên bản:
      | Thời điểm | Thay đổi | Nguồn |
      |-----------|----------|-------|
    - Tối đa 1000 words per page.
    - **BẮT BUỘC dùng `[[pages/category/slug.md]]` syntax** khi nhắc đến bất kỳ model, framework, method, concept, researcher, lab, dataset, benchmark, tool nào:
      - Entity → `[[pages/entities/slug.md]]`
      - Topic → `[[pages/topics/slug.md]]`
      - Summary → `[[pages/summaries/slug.md]]`
