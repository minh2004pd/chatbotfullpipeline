# ============================================================
# LLM & Agent Configuration
# Tất cả config liên quan đến LLM, embedding, prompts, RAG
# ============================================================

llm:
  model: "gemini-2.5-flash"
  temperature: 0.7
  top_p: 0.95
  top_k: 40
  max_output_tokens: 8192

embedding:
  model: "gemini-embedding-001"
  # output_dimensionality được truyền thẳng vào Gemini API.
  # gemini-embedding-001 hỗ trợ: 768 | 1536 | 3072 (mặc định API trả về 3072)
  # ⚠️ Đổi giá trị này → phải reset Qdrant collections (mất toàn bộ data):
  #    docker compose down -v && docker compose up -d
  dimension: 768
  batch_size: 20

prompts:
  system_instruction: |
    ## VAI TRÒ
    Bạn là **MemRAG** — trợ lý AI thông minh với khả năng truy xuất tài liệu và ghi nhớ hội thoại. Bạn trả lời mọi câu hỏi: từ chat thông thường, giải thích, lập trình, sáng tạo, đến phân tích chuyên sâu — không giới hạn lĩnh vực.

    ## NỔI BẬT
    - **Knowledge Base (Wiki):** Tự động tổng hợp từ papers/tài liệu bạn upload. **LUÔN LÀ ƯU TIÊN SỐ 1**. Mọi câu hỏi liên quan nội dung tài liệu → wiki trước, chỉ RAG khi wiki thực sự không đủ.
    - **Tài liệu & Transcript:** Tìm bằng `search_documents`, `search_meeting_transcripts`. Xem danh sách bằng `list_user_documents`, `list_meetings`.
    - **Memory:** Gọi `retrieve_memories` song song để nhớ context cá nhân. `store_memory` để ghi nhớ thông tin quan trọng.

    ## CHIẾN LƯỢC GỌI TOOL

    ### Quy tắc tối thượng: WIKI TRƯỚC, RAG SAU

    ⚠️ **BẮT BUỘC**: Với MỌI câu hỏi liên quan nội dung tài liệu, meeting, kiến thức đã upload:
    1. **LUÔN** gọi `read_wiki_index` trước tiên — không bao giờ skip bước này
    2. Đọc tất cả pages liên quan bằng `read_wiki_page`
    3. Nếu wiki đã trả lời đủ câu hỏi → **TRẢ LỜI NGAY, KHÔNG GỌI RAG**
    4. CHỈ KHI wiki không đủ thông tin (stub, thiếu số liệu cụ thể, topic không có trong index) → mới gọi `search_documents` / `search_meeting_transcripts`

    **Bước 1 — Wiki (LUÔN LÀM TRƯỚC, KHÔNG BAO GIỜ BỎ QUA)**
    Gọi `read_wiki_index` → xem toàn bộ danh sách pages.
    Từ index, xác định trang nào liên quan → gọi `read_wiki_page` cho từng trang đó.
    - Trang có `[[pages/.../*.md]]` links → đọc thêm các trang được link nếu liên quan.
    - `is_stub: true` → trang chưa đủ nội dung → cần RAG bổ sung.
    - `backlinks` → đọc thêm nếu cần context đa chiều.

    **Bước 2 — RAG (CHỈ KHI WIKI THỰC SỰ KHÔNG ĐỦ)**
    Gọi `search_documents` / `search_meeting_transcripts` khi:
    - Topic/entity có trong index nhưng trang là stub hoặc thiếu thông tin cụ thể
    - Câu hỏi cần trích dẫn nguyên văn, con số cụ thể không có trong wiki
    - Topic/entity không xuất hiện trong index (chưa được tổng hợp vào wiki)
    - Câu hỏi span nhiều sources → gọi song song

    ### Câu hỏi chung (không liên quan tài liệu đã upload)
    KHÔNG gọi tool. Trả lời trực tiếp bằng kiến thức của bạn.

    ### Câu hỏi về danh sách
    "Tài liệu nào?", "Những buổi họp nào?" → `list_user_documents` / `list_meetings` trước.

    ### Memory
    Gọi `retrieve_memories` song song với Bước 1 khi trả lời câu hỏi cá nhân hóa.

    ## QUY TẮC TRẢ LỜI
    - Trả lời tự nhiên như một trợ lý thông minh — rõ ràng, hữu ích, đúng trọng tâm.
    - Có nguồn từ tài liệu: ghi rõ **[tên paper/tài liệu]** hoặc **[tên cuộc họp]**. Từ Wiki: "(Wiki — tổng hợp từ [sources])".
    - Khi so sánh ≥ 3 items: dùng bảng Markdown.
    - Không có trong tool: nói rõ, rồi dùng kiến thức của bạn nếu phù hợp — ghi "(kiến thức chung)".
    - Ngôn ngữ trùng người dùng; thuật ngữ kỹ thuật giữ nguyên gốc.
    - Lập trình: giải thích ngắn gọn, đưa code đúng ngôn ngữ, comment khi cần.
    - Khi trả lời dài: dùng headings, bullet points, tables cho dễ đọc.

  wiki_topic_extract_prompt: |
    Trích xuất entities và topics từ nội dung để xây dựng Knowledge Base.
    Nguồn: "{source_name}"

    Nội dung có thể là BẤT KỲ dạng nào — họp nội bộ, hợp đồng, báo cáo tài chính, bệnh án, paper nghiên cứu, kế hoạch dự án, ghi chú cá nhân, v.v.
    Trích xuất mọi entity quan trọng không phân biệt lĩnh vực.

    Trả về JSON (chỉ JSON thuần, không text khác):
    {{
      "entities": [{{"slug": "slug", "title": "Tên đầy đủ", "type": "person|org|product|tool|method|concept|model|framework|dataset|benchmark"}}],
      "topics": [{{"slug": "slug", "title": "Tên chủ đề"}}],
      "summary": {{"slug": "slug", "title": "Tóm tắt: {source_name}"}}
    }}

    ⚠️ BẮT BUỘC: entities ≥ 1, topics ≥ 1, summary = 1.

    ---

    ## ENTITY — tối đa {max_entities}

    **Nguyên tắc**: Entity = tên riêng chỉ định 1 thực thể cụ thể. Đủ để viết 1 trang riêng.
    Không phân biệt lĩnh vực — kỹ thuật, kinh doanh, y tế, pháp lý, khoa học, đời thường đều hợp lệ.

    | Type | Mô tả | Ví dụ (đa lĩnh vực) |
    |------|-------|----------------------|
    | **person** | Cá nhân bất kỳ có tên | Nguyễn Thị Lan, Warren Buffett, "Anh Minh (CTO)", Hippocrates |
    | **org** | Tổ chức, công ty, đội nhóm, cơ quan có tên | Viettel, WHO, "Ban Kiểm soát", MIT, "Nhóm vận hành ca 3" |
    | **product** | Sản phẩm, dịch vụ, hệ thống, tính năng có tên | "Gói Bảo Hiểm Sức Khỏe Gia Đình", Salesforce, iPhone, "Module Phê duyệt Tín dụng" |
    | **tool** | Công cụ, phần mềm, thiết bị, nền tảng có tên | Excel, Docker, Jira, "Máy CT-Scan GE Revolution", PostgreSQL, Figma |
    | **method** | Quy trình/phương pháp có TÊN RIÊNG được công nhận | Scrum, CRISPR, "Phương pháp 5S", A/B Testing, Kanban, Monte Carlo |
    | **concept** | Lý thuyết/khái niệm/paradigm có tên riêng | "Lý thuyết Trò chơi", Blockchain, ACID, "Kinh tế Tuần hoàn", Microservices |
    | **model** | Model định lượng/AI/thống kê có tên | "Mô hình Black-Scholes", GPT-4o, ARIMA, GARCH |
    | **framework** | Thư viện/chuẩn/platform kỹ thuật có tên | ISO 27001, React, PyTorch, OAuth 2.0 |
    | **dataset** | Tập dữ liệu có tên | "Báo cáo Tài chính Q1 2024", ImageNet, "Hồ sơ Bệnh nhân 2023" |
    | **benchmark** | Bộ tiêu chuẩn đánh giá có tên | HELM, TPC-C, "KPI Doanh thu Q3" |

    ❌ BỎ QUA nếu là mô tả chung, không có tên riêng:
    "hệ thống", "nhóm dự án", "sản phẩm của chúng tôi", "quy trình hiện tại", "công nghệ mới", "best practices"

    ---

    ## TOPICS — ít nhất 1, tối đa {max_topics}

    Topic = vấn đề/chủ đề CHÍNH đang được bàn. Đủ cụ thể để viết 1 trang wiki riêng.

    Ví dụ đa lĩnh vực:
    - Họp/Dự án: "Kế hoạch Ra mắt Sản phẩm Q4", "Đàm phán Hợp đồng Nhà cung cấp", "Tái cơ cấu Nhân sự Phòng Kinh doanh"
    - Kỹ thuật: "Chiến lược Nâng cấp Hệ thống Core Banking", "Tối ưu Chi phí Cloud", "Bảo mật API Production"
    - Kinh doanh/Tài chính: "Dự báo Doanh thu 2025", "Phân tích Churn Khách hàng", "Mở rộng Thị trường Đông Nam Á"
    - Y tế/Khoa học: "Phác đồ Điều trị Hậu Covid", "Kết quả Thử nghiệm Lâm sàng Giai đoạn 2"
    - Cá nhân/Học tập: "Lộ trình Phát triển Kỹ năng Leadership", "Đánh giá 360 độ Nhân viên"
    - Pháp lý/Tuân thủ: "Tuân thủ GDPR Dữ liệu Khách hàng", "Tranh chấp Bản quyền Phần mềm"

    ❌ Quá chung: "Kinh doanh", "Công nghệ", "Họp hàng tuần", "Tổng quan dự án"
    ❌ Trùng với entity đã extract.
    Quy tắc: title 2–6 từ, rõ nghĩa, ngôn ngữ nội dung (tiếng Việt hoặc Anh).

    ---

    ## SLUG
    Chỉ [a-z0-9], không gạch ngang, không dấu, tối đa 60 ký tự.
    "Nguyễn Thị Lan" → "nguyenthilan" | "GPT-4o" → "gpt4o" | "Gói Bảo Hiểm VIP" → "goibaohiemvip"

    {wiki_context}

    ## Nội dung cần trích xuất:
    {text}
  wiki_synthesis_prompt: |
    ## Quy tắc Wiki (wiki_schema.md — nguồn sự thật, ưu tiên hơn mọi hướng dẫn bên dưới nếu mâu thuẫn):
    {schema}

    ---

    Cập nhật trang Wiki về "{topic_title}" (type: **{topic_type}**) với thông tin mới từ nguồn "{source_name}" (ID: {source_id}).

    ⚠️ Dùng template phù hợp với type **"{topic_type}"** ở phía dưới. Nếu type là "auto", suy luận từ tên entity.
    Types hợp lệ: person | org | product | model | framework | dataset | benchmark | tool | method | concept | topic | summary

    ## Nội dung Wiki hiện tại (trống nếu trang mới):
    {existing_content}

    ## Nội dung mới cần tích hợp:
    {new_text}

    Yêu cầu output (chỉ Markdown thuần, KHÔNG bọc trong code fence ```, không có text giải thích ngoài):

    ⚠️ QUY TẮC CHÍNH XÁC (bắt buộc — ưu tiên hơn mọi quy tắc khác):
    1. KHÔNG bịa số liệu: Mọi con số, metric, stat PHẢI có trong `new_text` hoặc `existing_content`. Không được tự suy ra.
    2. Giữ nguyên số liệu: KHÔNG làm tròn, KHÔNG đổi đơn vị. "93.7%" → giữ nguyên "93.7%".
    3. Công thức/code: Copy chính xác từ nguồn.
    4. Nếu không chắc: Thà bỏ trống hoặc ghi "(số liệu không có trong nguồn)" còn hơn bịa.
    5. Đối chiếu trước khi viết: Mỗi claim có số liệu → kiểm tra lại trong nguồn.
    6. **MERGE, KHÔNG REPLACE**: Giữ TOÀN BỘ nội dung hiện tại. `new_text` chứa toàn bộ đoạn văn liên quan — tổng hợp đầy đủ, không bỏ sót section nào.
    7. **One-pass synthesis**: Viết đầy đủ, chi tiết ngay từ đầu — đừng viết tóm tắt hay placeholder.
    8. **Bảng Markdown đúng chuẩn GFM**: BẮT BUỘC có dòng separator sau header row:
       ```
       | Header 1 | Header 2 |
       |----------|----------|
       | Cell 1   | Cell 2   |
       ```

    Bắt đầu bằng YAML frontmatter:
    ---
    title: (tên entity/topic)
    tags: [tag1, tag2]
    type: (1 trong: person|org|product|model|framework|dataset|benchmark|tool|method|concept|topic|summary)
    sources: [{source_id}]
    last_updated: (ngày hôm nay ISO 8601)
    version: (tăng 1 so với version cũ, hoặc 1 nếu trang mới)
    ---

    ⚠️ QUAN TRỌNG về trường `sources`:
    - Dùng source ID (ví dụ: "{source_id}"), KHÔNG dùng tên file
    - Nếu trang đã có sources từ trước, GIỮ NGUYÊN và THÊM "{source_id}"
    - Ví dụ đúng: sources: [doc-abc123, doc-xyz789]

    **Cho entity loại model (AI/ML model, mô hình tài chính, mô hình thống kê, mô hình dự báo...):**
    ## Tổng quan
    Là gì, do ai/org nào phát triển, thuộc lĩnh vực nào, dùng để làm gì.
    ## Cấu trúc & Tham số
    Công thức, tham số, biến đầu vào/đầu ra, assumptions chính.
    ## Kết quả & Đánh giá
    Số liệu cụ thể từ nguồn — độ chính xác, metric, so sánh với alternatives.
    ## Điều kiện áp dụng & Hạn chế
    Khi nào dùng được, giả định cần thoả mãn, điểm yếu đã biết.
    ## Entities liên quan
    [[pages/entities/slug.md]] — quan hệ.
    ## Tiến triển & Phiên bản
    Tracking thay đổi qua các phiên bản / nguồn.

    ---

    **Cho entity loại method (bất kỳ phương pháp/quy trình/algorithm cụ thể):**
    ## Vấn đề giải quyết
    Method này ra đời để giải quyết vấn đề gì, trong lĩnh vực nào.
    ## Cách hoạt động
    Mô tả step-by-step, quy trình, hoặc pseudocode nếu nguồn có. Giữ nguyên notation/thuật ngữ.
    ## Điều kiện áp dụng
    Khi nào nên dùng, prerequisites, constraints, điều kiện tổ chức/kỹ thuật.
    ## Kết quả & Bằng chứng
    Hiệu quả thực tế, improvement so với cách cũ, số liệu đo lường (nếu có trong nguồn).
    ## Biến thể & Mở rộng
    Các biến thể, phiên bản cải tiến, adaptations cho domain khác.
    ## Entities liên quan
    [[pages/entities/slug.md]] — mô tả quan hệ.

    ---

    **Cho entity loại concept (kiến trúc/paradigm tổng quát):**
    ## Định nghĩa
    Là gì, thuộc lĩnh vực nào, giải quyết vấn đề gì.
    ## Nguyên lý cốt lõi
    Key ideas, mathematical/intuitive foundation.
    ### Công thức (nếu có)
    $$ ... LaTeX formula ... $$
    **Giải thích biến số:**
    - $\alpha$ = ...
    ## Ứng dụng chính
    Được dùng trong loại system/model nào.
    ## Methods cụ thể thuộc concept này
    [[pages/entities/method-slug.md]] — các method implement concept này.
    ## Entities liên quan
    [[pages/entities/slug.md]]

    ---

    **Cho entity loại dataset/benchmark:**
    ## Mô tả
    Mục đích, domain, quy mô, ai tạo ra/quản lý.
    ## Cấu trúc & Nội dung
    Các thành phần, format, cách tổ chức dữ liệu, metric đo lường.
    ## Bảng so sánh kết quả / Leaderboard
    | Hệ thống / Phương pháp | Kết quả | Thời điểm | Nguồn |
    |------------------------|---------|-----------|-------|
    Giữ nguyên kết quả cũ, thêm mới.
    ## Xu hướng
    1-2 câu phân tích xu hướng qua thời gian.
    ## Được dùng để đánh giá / Phạm vi áp dụng
    ## Hạn chế & Lưu ý đã biết

    ---

    **Cho entity loại framework/tool/platform:**
    ## Tổng quan
    Là gì, do ai phát triển, dùng để làm gì.
    ## Kiến trúc & Thành phần chính
    Core architecture, modules, components.
    ## Cài đặt & Cấu hình
    Requirements, setup steps, config key points.
    ## Use Cases & Ví dụ
    Các use case tiêu biểu, code mẫu nếu có.
    ## So sánh với alternatives
    So sánh nhanh với các framework/tool tương tự.
    ## Entities liên quan
    [[pages/entities/slug.md]]

    ---

    **Cho entity loại person (cá nhân):**
    ## Tổng quan
    Vai trò, tổ chức, lĩnh vực chuyên môn.
    ## Đóng góp & Công việc chính
    Dự án, sản phẩm, nghiên cứu, quyết định quan trọng được đề cập trong nguồn.
    ## Quan điểm & Phong cách làm việc
    (Nếu có thông tin từ nguồn)
    ## Entities liên quan
    [[pages/entities/slug.md]] — tổ chức, dự án, sản phẩm liên quan.

    ---

    **Cho entity loại org (tổ chức, công ty, đội nhóm):**
    ## Tổng quan
    Loại tổ chức, lĩnh vực, quy mô (nếu biết).
    ## Sản phẩm & Dự án chính
    Các sản phẩm, dự án, đóng góp nổi bật được đề cập.
    ## Nhân sự chính
    [[pages/entities/person-slug.md]] — vai trò.
    ## Entities liên quan
    [[pages/entities/slug.md]]

    ---

    **Cho entity loại product (sản phẩm, dịch vụ, hệ thống):**
    ## Tổng quan
    Sản phẩm là gì, do ai phát triển/sở hữu, mục đích.
    ## Tính năng & Khả năng chính
    Danh sách tính năng, specs, capabilities được đề cập trong nguồn.
    ## Người dùng & Use Cases
    Ai dùng, dùng để làm gì.
    ## Trạng thái & Phiên bản
    Version, release status, roadmap (nếu có).
    ## Entities liên quan
    [[pages/entities/slug.md]] — org, team, công nghệ liên quan.

    ---

    **Cho topic (chủ đề cấp cao):**
    ## Vấn đề & Động lực
    ## Các approach đang được thảo luận
    ## Kết quả nổi bật (kèm số liệu)
    ## Open challenges
    ## Key entities liên quan

    ---

    **Cho summary (tóm tắt nguồn đơn lẻ):**
    ## Thông tin nguồn
    - **Source ID**: {source_id}
    - **Tên nguồn**: {source_name}
    - **Tác giả / Người tạo**: (nếu có)
    - **Thời điểm / Nguồn gốc**: (nếu có — ngày họp, năm xuất bản, hội nghị, phòng ban, v.v.)
    - **Lĩnh vực**: (tự động xác định)
    ## TL;DR (1-2 câu)
    ## Điểm chính (bullet points)
    ## Chi tiết
    ## Kết luận & Hạn chế
    ## Entities được đề cập
    Liệt kê đầy đủ với [[pages/entities/slug.md]] — vai trò.

    ⚠️ QUY TẮC TÍCH HỢP (bắt buộc):
    - Giữ nguyên thuật ngữ chuyên ngành bằng gốc.
    - Gắn nguồn sau mỗi claim: [tên nguồn].
    - Nếu thông tin mới MÂU THUẪN: KHÔNG xóa — dùng strikethrough:
      ~~Thông tin cũ [nguồn cũ]~~ → Thông tin mới [nguồn mới]
    - Thêm section "## Lịch sử / Tiến triển" khi có mâu thuẫn:
      | Thời điểm | Thay đổi | Nguồn |
      |-----------|----------|-------|
    - Tối đa 1000 words per page.
    - **BẮT BUỘC dùng `[[pages/category/slug.md]]` syntax** khi nhắc đến entity/topic:
      - Entity → `[[pages/entities/slug.md]]`
      - Topic → `[[pages/topics/slug.md]]`
      - Summary → `[[pages/summaries/slug.md]]`
      Slug chỉ gồm `[a-z0-9]`.
    - Section "Entities liên quan" PHẢI liệt kê đầy đủ.

  wiki_conversation_relevance_prompt: |
    Đánh giá xem conversation summary dưới đây có chứa thông tin đáng cập nhật vào Wiki không.

    ## Wiki hiện có:
    {wiki_context}

    ## Conversation Summary:
    {summary_text}

    ## Nhiệm vụ:
    1. Xác định summary có chứa thông tin mới (số liệu, kết luận, quyết định, phát hiện, kiến thức) liên quan đến entities/topics đã có trong Wiki không.
    2. Nếu có, liệt kê các slug (chỉ slug, không có category) của các trang cần update.
    3. Chitchat, câu hỏi chung, greeting → KHÔNG update.

    Trả về JSON object (chỉ JSON thuần, không có text khác):
    {{"should_update": true/false, "matched_slugs": ["slug1", "slug2"], "reason": "lý do ngắn gọn"}}

    Quy tắc:
    - `should_update=true` CHỈ KHI có ít nhất 1 matched_slug VÀ có thông tin thực sự mới
    - `matched_slugs` chỉ dùng các slug đã có trong danh sách Wiki hiện có
    - Tối đa 5 slugs

  wiki_conversation_synthesis_prompt: |
    Bổ sung thông tin mới từ conversation vào trang Wiki đã có.

    ## Trang Wiki hiện tại (KHÔNG thay đổi structure, KHÔNG xóa thông tin cũ):
    {existing_content}

    ## Thông tin mới từ conversation (chỉ lấy facts liên quan):
    {new_info}

    ## Quy tắc BẮT BUỘC:
    1. CHỈ thêm thông tin mới vào section phù hợp — KHÔNG thay đổi structure, KHÔNG xóa bất kỳ thông tin nào
    2. Nếu thông tin đã có → KHÔNG lặp lại, bỏ qua
    3. Giữ nguyên frontmatter (title, tags, sources, last_updated, version) — chỉ tăng version thêm 1
    4. Thêm `conversation:{source_id}` vào sources list nếu chưa có
    5. Nếu không có thông tin mới thực sự → trả về NGUYÊN XI trang Wiki hiện tại (không thay đổi gì)
    6. Giữ nguyên tất cả `[[pages/...]]` links
    7. KHÔNG bịa thêm thông tin không có trong conversation

    Trả về toàn bộ nội dung trang Markdown (bao gồm frontmatter).
    Source ID để thêm vào sources: {source_id}
    Tên trang: {topic_title}

rag:
  chunk_size: 1000
  chunk_overlap: 200
  top_k_results: 5
  max_doc_length: 8192
  max_query_length: 2048
