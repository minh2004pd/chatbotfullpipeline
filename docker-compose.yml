services:
  redis:
    image: redis:7-alpine
    container_name: memrag-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: memrag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: memrag-dynamodb
    ports:
      - "8001:8000"
    command: "-jar DynamoDBLocal.jar -inMemory -sharedDb"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: memrag-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: memrag
      POSTGRES_USER: memrag
      POSTGRES_PASSWORD: memrag
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memrag -d memrag"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: memrag-backend
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      dynamodb-local:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DEBUG=true
      - QDRANT_URL=http://qdrant:6333
      - DYNAMODB_ENDPOINT_URL=http://dynamodb-local:8000
      - DATABASE_URL=postgresql+asyncpg://memrag:memrag@postgres:5432/memrag
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data:
  redis_data:

# http://localhost:8000/docs
# http://localhost:6333/dashboard
# http://localhost:8001  (DynamoDB Local — dùng AWS CLI hoặc NoSQLWorkbench để xem)
