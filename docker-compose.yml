services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: memrag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: memrag-backend
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

volumes:
  qdrant_data:
  uploads_data:

